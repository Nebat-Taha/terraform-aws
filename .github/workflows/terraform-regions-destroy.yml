# .github/workflows/destroy.yml

name: Terraform Destroy Resources

on:
  workflow_dispatch:
    inputs:
      region:
        description: "AWS Region to destroy resources in (e.g., us-east-1, ap-southeast-2, eu-central-1)"
        required: true
        type: choice
        options:
          - us-east-1
          - ap-southeast-2
          - eu-central-1
      confirm_destroy:
        description: 'Type "destroy" to confirm resource destruction. THIS IS DESTRUCTIVE!'
        required: true
        type: string

permissions: # Apply least-privilege permissions at the workflow level
  contents: read # Required to checkout the code
  id-token: write # Required for aws-actions/configure-aws-credentials with OIDC

jobs:
  destroy_region:
    runs-on: ubuntu-latest
    # Add a conditional check to ensure the 'confirm_destroy' input matches "destroy"
    if: github.event.inputs.confirm_destroy == 'destroy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1 # Ensure this matches your deploy workflow's version

      - name: Configure AWS credentials for ${{ github.event.inputs.region }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Terraform Init -reconfigure for ${{ github.event.inputs.region }}
        run: terraform init -reconfigure
        working-directory: ./terraform/regions/${{ github.event.inputs.region }}

      - name: Terraform Plan (Destroy)
        id: plan_destroy
        run: terraform plan -destroy -no-color
        working-directory: ./terraform/regions/${{ github.event.inputs.region }}

      - name: Terraform Destroy
        id: destroy
        # Only run destroy if the plan was successful and confirmed
        run: terraform destroy -auto-approve
        working-directory: ./terraform/regions/${{ github.event.inputs.region }}
